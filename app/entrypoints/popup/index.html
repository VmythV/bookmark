<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Bookmark</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="panel">
      <header class="panel__head">
        <span class="panel__icon">🔖</span>
        <h1 class="panel__title">Save bookmark</h1>
      </header>

      <section class="field">
        <label for="title">Title</label>
        <input id="title" type="text" />
      </section>

      <section class="field">
        <label for="folder">Folder</label>
        <select id="folder"></select>
        <button id="newFolder" class="link" type="button">New folder…</button>
        <ul id="recs" class="recs"></ul>
      </section>

      <section class="field">
        <label for="tags">Tags <span class="muted">(comma-separated)</span></label>
        <input id="tags" type="text" placeholder="machine learning, rust, …" />
        <ul id="tagSugg" class="tagSugg"></ul>
      </section>

      <footer class="panel__foot">
        <button id="save" class="btn btn--primary" disabled>Save</button>
        <button id="search" class="btn">Search</button>
      </footer>

      <div id="status" class="status" hidden></div>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
