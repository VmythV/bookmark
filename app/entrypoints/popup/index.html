<!doctype html>
<html lang="en" data-theme="smartbookmark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Bookmark</title>
  </head>
  <body class="bg-base-100 text-base-content">
    <main class="w-[360px] p-4 flex flex-col gap-3">
      <header class="flex items-center gap-2 pb-2 border-b border-base-300">
        <span class="text-xl">🔖</span>
        <h1 class="font-semibold text-base grow">Save bookmark</h1>
        <button id="openSettings" class="btn btn-ghost btn-xs" title="Settings">⚙️</button>
      </header>

      <label class="form-control">
        <span class="label-text text-xs opacity-70 mb-1">Title</span>
        <input id="title" type="text" class="input input-bordered input-sm w-full" />
      </label>

      <label class="form-control">
        <span class="label-text text-xs opacity-70 mb-1">Folder</span>
        <select id="folder" class="select select-bordered select-sm w-full"></select>
      </label>
      <div id="recs" class="flex flex-wrap gap-1.5"></div>
      <button id="newFolder" class="link link-primary text-xs self-start" type="button">+ New folder…</button>

      <label class="form-control">
        <span class="label-text text-xs opacity-70 mb-1">Tags <span class="opacity-50">(comma-separated)</span></span>
        <input id="tags" type="text" placeholder="machine learning, rust, …" class="input input-bordered input-sm w-full" />
      </label>
      <div id="tagSugg" class="flex flex-wrap gap-1.5"></div>

      <div class="flex gap-2 pt-1">
        <button id="save" class="btn btn-primary btn-sm grow" disabled>Save</button>
      </div>

      <div id="status" class="text-xs" hidden></div>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
